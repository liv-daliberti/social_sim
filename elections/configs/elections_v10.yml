# Elections GRPO v10 — first real training run.
#
# Training target: exact analytical P(Blue wins | E1, E2, E3, E4) from the DAG.
# Tasks: 173 unique E-combos, each with its true conditional probability as a
# float label. The model must learn to be calibrated across all news-signal
# combinations, not just 16.
#
# Steps: 173 tasks / batch_size 8 = ~22 batches/epoch × 5 epochs ≈ 110 steps.
mode: train

tasks_file: data/elections_train.tasks.jsonl
eval_tasks_file: data/elections_eval.tasks.jsonl
output_dir: reports/tinker_elections_grpo/elections_v10

max_tasks: 173
eval_max_tasks: 43

model: Qwen/Qwen3-4B-Instruct-2507
renderer_name: qwen3
agent_lightning_examples_path: /n/fs/similarity/social_sim/.runtime/agl_tinker_examples

learning_rate: 5.0e-5
batch_size: 8
group_size: 4
n_epochs: 5
train_shuffle: true
train_seed: 42
n_runners: 1
lora_rank: 16
num_substeps: 1
eval_every: 5
skip_initial_eval: false
save_every: 10
execution_strategy: shm
strategy_main: algorithm
llm_proxy_launch_mode: thread
llm_proxy_port: 12358
store_port: 4747

max_tokens: 512
temperature: 1.0
eval_temperature: 0.0
forecast_reward_scale: 2.0
llm_request_timeout_seconds: 90

wandb: true
wandb_project: elections_tinker
wandb_entity: ogd3-princeton-university
wandb_mode: online
wandb_run_name: elections-v10
wandb_tags: elections,v10,brier,exact-label,qwen3-4b,173-combos
